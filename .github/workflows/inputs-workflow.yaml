name: Testing Inputs Workflow
on:
  workflow_dispatch:
    inputs:
      Number-1:
        description: "Enter the first number"
        required: true
        default: "1000"
      Number-2:
        description: "Enter the second number"
        required: true
        default: "500"
jobs:
  ADD_THE_NUMBERS:
    runs-on: self-hosted
    steps:
      - name: ADDING THE NUMBERS
        run: |
          sum=$(( ${{ inputs.Number-1 }} + ${{ inputs.Number-2 }} ))
          echo "The sum of the numbers is $sum"
    
  config-variable:
    runs-on: self-hosted

    steps:
      # ... your existing steps ...

      - name: Compute remaining time before 5-day limit
        id: time_left
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TOKEN }}
          script: |
            const limitMs = 5 * 24 * 60 * 60 * 1000; // 5 days
            const { owner, repo } = context.repo;
            const run_id = context.runId;

            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id,
            });

            const started = new Date(run.run_started_at);
            const now = new Date();
            const elapsedMs = now - started;
            const remainingMs = Math.max(0, limitMs - elapsedMs);

            const remainingSeconds = Math.floor(remainingMs / 1000);

            core.info(`Elapsed: ${Math.floor(elapsedMs / 1000)}s`);
            core.info(`Remaining before 5-day cap: ${remainingSeconds}s`);

            core.setOutput('remaining_seconds', remainingSeconds);

      - name: Use remaining time
        run: |
          echo "Remaining seconds before 5-day cap: ${{ steps.time_left.outputs.remaining_seconds }}"
          